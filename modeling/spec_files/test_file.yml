# spec file for testing GRAMMLET

directories:
  base_dir: data/processed/HIRHAM5-ERAInterim/v_02
  data_file: test_file
  out_dir: output/test
  overwrite: true
  temp_split_file: train_val_test_split_small.json
  spatial_sub_file: GRL_subsampleidx_5000_flattened.zarr
  zones_file: GRLzones.zarr

data:
  input:
  - tas
  - snfall
  - ahfs
  - snfall_10yr-avg
  prec_days: 1
  target: 
  - snmel
  transform_inputs:
   ahfs: [sym_log,15]

model:
  auto:
    snmel: 1
  hidden_activation: LeakyReLU
  layers_daily_feat_extractor:
  - 64
  layers_medrange_feat_extractor:
  layers_regressor:
  - 64
  - 16
  layers_spinup_feat_extractor: [32]
  output_activation: ""
  use_season: true

training:
  auto_mode: false
  batch_size: 256
  continue_training: false
  epochs: 3
  loss_reg: mse
  loss_weights: trainable    # must be 'equal', or 'trainable', or a dict with respective weight for each target (weights will be normalized to sum to 1)
  lr: 0.005
  lr_decay: 0.9
  lr_decay_epochs: 50
  optimizer: adam

